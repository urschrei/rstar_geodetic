name: Build Python wheels

on:
  push:
    tags:
      # Python release tags only (for example py-v0.1.0), so Rust crate release
      # tags never trigger a PyPI publish.
      - "py-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: build
          args: --release --out dist
          sccache: "true"
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: python/dist/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    # Publish only on tag pushes, not manual wheel-build runs.
    if: startsWith(github.ref, 'refs/tags/py-v')
    needs:
      - wheels
      - sdist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI trusted publishing (OIDC).
      id-token: write
    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
